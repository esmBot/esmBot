name: Docker

on:
  workflow_call:
    inputs:
      stable:
        type: boolean
        default: false
      imagemagick:
        type: boolean
        default: false
      tags:
        type: string

env:
  REGISTRY_IMAGE: ghcr.io/esmbot/esmbot

jobs:
  build-image:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-24.04
            key: linux/amd64
          - os: ubuntu-24.04-arm
            key: linux/arm64
    name: Build and Publish Docker Image (${{matrix.platform.key}})
    runs-on: ${{matrix.platform.os}}
    steps:
      - uses: actions/checkout@v7
      - name: Prepare
        run: |
          platform=${{ matrix.platform.key }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: latest=${{ inputs.stable && 'true' || 'auto' }}
      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          push: true
          build-args: |
            MAGICK=${{ inputs.imagemagick && '1' || '0' }}
          platforms: ${{ matrix.platform.key }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.REGISTRY_IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}-${{ inputs.imagemagick && 'magick' || 'no-magick' }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-images:
    runs-on: ubuntu-24.04
    needs:
      - build-image
    steps:
      - uses: actions/checkout@v7
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*-${{ inputs.imagemagick && 'magick' || 'no-magick' }}
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: latest=${{ inputs.stable && 'true' || 'auto' }}
          tags: ${{ inputs.tags }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
