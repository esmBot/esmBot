name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            export PATH="$PATH:/root/.nvm/versions/node/v22.22.2/bin"
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin master
            pnpm run build
            pnpm pm2 restart all

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deploy failed — check server logs or build output above"
